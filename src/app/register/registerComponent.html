<div class="flex justify-center items-center min-h-screen bg-gray-50 bg-login bg-cover bg-center py-10">
  <form (ngSubmit)="onSubmit()" [formGroup]="form" class="bg-white p-8 rounded-2xl shadow-xl w-full max-w-md mx-4 backdrop-blur-sm bg-opacity-95">
    <div class="mb-8 text-center">
      <h2 class="font-extrabold text-gray-900 text-3xl">Create Account</h2>
      <p class="text-gray-500 mt-2 text-sm">Sign up to get started</p>
    </div>
    
    <div class="space-y-5">
      <div>
        <label for="Username" class="block text-sm font-medium text-gray-700 mb-1">Username</label>
        <input id="Username" type="text" formControlName="userName"
          class="w-full px-4 py-2.5 bg-gray-50 border border-gray-300 rounded-lg focus:ring-2 focus:ring-lime-500 focus:border-transparent outline-none transition-all duration-200"
          [ngClass]="{ 'border-red-500 bg-red-50': userNameIsInvalid }" />
        <span class="text-red-500 text-xs mt-1 block h-4">
          {{ userNameIsInvalid ? 'Username must be 6+ chars' : '' }}
        </span>
      </div>

      <div>
        <label for="email" class="block text-sm font-medium text-gray-700 mb-1">Email</label>
        <input id="email" type="email" formControlName="email"
          class="w-full px-4 py-2.5 bg-gray-50 border border-gray-300 rounded-lg focus:ring-2 focus:ring-lime-500 focus:border-transparent outline-none transition-all duration-200"
          [ngClass]="{ 'border-red-500 bg-red-50 focus:ring-red-500': emailIsInvalid }" />      
        <span class="text-red-500 text-xs mt-1 block h-4">
          {{ emailIsInvalid ? 'Please enter a valid email address.' : '' }}
        </span>
      </div>
      
      <div>
        <label for="password" class="block text-sm font-medium text-gray-700 mb-1">Password</label>
        <input id="password" type="password" formControlName="password"
          class="w-full px-4 py-2.5 bg-gray-50 border border-gray-300 rounded-lg focus:ring-2 focus:ring-lime-500 focus:border-transparent outline-none transition-all duration-200"
          [ngClass]="{ 'border-red-500 bg-red-50 focus:ring-red-500': passwordIsInvalid }" />
        <span class="text-red-500 text-xs mt-1 block h-4">
          {{ passwordIsInvalid ? 'Password must contain symbol, number, uppercase, 6+ chars.' : '' }}
        </span>
      </div>

      <button type="submit" 
        class="w-full bg-lime-600 text-white font-semibold py-3 px-4 rounded-lg hover:bg-lime-700 focus:ring-4 focus:ring-lime-200 transition-all duration-200 transform hover:-translate-y-0.5 shadow-md mt-6">
        Register
      </button>

      <p class="text-center text-sm text-gray-600 mt-6">
        Already have an Account?
        <a routerLink="/login" class="font-semibold text-lime-600 hover:text-lime-700 hover:underline transition-colors">
          Log in here
        </a>
      </p>
    </div>
  </form>
</div>
