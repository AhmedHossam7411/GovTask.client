<div class="flex justify-center items-center min-h-screen">
  <form (ngSubmit)="onSubmit()" [formGroup]="form"
        class="bg-cream-50 p-9 shadow-2xl w-full max-w-md mx-4 border border-ink-900/10 backdrop-blur-sm bg-opacity-97">
    <div class="mb-8 text-center">
      <p class="text-bronze-500 text-[11px] font-semibold uppercase tracking-luxe mb-3">BehaviourShield</p>
      <h2 class="font-display font-semibold text-ink-900 text-4xl">Welcome Back</h2>
      <p class="text-stone2-500 mt-2 text-sm">Please sign in to your account</p>
    </div>

    <div class="space-y-6">
      <div>
        <label for="email" class="block text-xs font-semibold uppercase tracking-wider text-ink-800 mb-1.5">Email</label>
        <input id="email" type="email" formControlName="email"
          class="w-full px-4 py-2.5 bg-cream-100 border border-ink-900/15 focus:ring-2 focus:ring-sage-500 focus:border-transparent outline-none transition-all duration-200"
          [ngClass]="{ 'border-red-500 bg-red-50 focus:ring-red-500': emailIsInvalid }" />
        <span class="text-red-500 text-xs mt-1 block h-4">
          {{ emailIsInvalid ? 'Please enter a valid email address.' : '' }}
        </span>
      </div>

      <div>
        <label for="password" class="block text-xs font-semibold uppercase tracking-wider text-ink-800 mb-1.5">Password</label>
        <input id="password" name="password" autocomplete="current-password" type="password" formControlName="password"
          class="w-full px-4 py-2.5 bg-cream-100 border border-ink-900/15 focus:ring-2 focus:ring-sage-500 focus:border-transparent outline-none transition-all duration-200"
          [ngClass]="{ 'border-red-500 bg-red-50 focus:ring-red-500': passwordIsInvalid }" />
        <span class="text-red-500 text-xs mt-1 block h-4">
          {{ passwordIsInvalid ? 'Password must contain symbol, number, uppercase, 6+ chars.' : '' }}
        </span>
      </div>

      <div *ngIf="errorMessage" class="p-3 bg-red-50 border border-red-200 text-red-600 text-sm">
        {{ errorMessage }}
      </div>

      <button type="submit"
        class="w-full bg-ink-900 text-cream-50 font-semibold uppercase tracking-[0.18em] text-sm py-3.5 px-4 hover:bg-sage-700 focus:ring-4 focus:ring-sage-200 transition-all duration-200 shadow-md">
        Sign In
      </button>

      <p class="text-center text-sm text-stone2-600 mt-6">
        Don’t have an account?
        <a routerLink="/register" class="font-semibold text-sage-700 hover:text-sage-800 hover:underline transition-colors">
          Register here
        </a>
      </p>
    </div>
  </form>
</div>
