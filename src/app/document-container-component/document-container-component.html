<div class="min-h-screen flex flex-col">
  <div class="max-w-7xl mx-auto w-full px-4 sm:px-6 lg:px-8 pt-24 pb-10">
    <div class="bg-cream-50/90 backdrop-blur-md shadow-sm border border-ink-900/10 p-6 mb-8 flex flex-wrap gap-4 items-center justify-between">
      <div>
        <p class="text-bronze-500 text-[11px] font-semibold uppercase tracking-luxe mb-1">Records</p>
        <h1 class="text-4xl font-display font-medium text-ink-900 tracking-tight">Documents</h1>
        <p class="mt-1 text-sm text-stone2-500">Upload, track and manage official files</p>
      </div>

      <div class="flex items-center gap-4 bg-cream-100/60 p-3 border border-ink-900/10 shadow-inner w-full md:w-auto">

        <div class="relative flex-1 min-w-[200px] md:min-w-[300px]">
          <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
            <svg class="h-5 w-5 text-stone2-400" viewBox="0 0 20 20" fill="currentColor"><path fill-rule="evenodd" d="M8 4a4 4 0 100 8 4 4 0 000-8zM2 8a6 6 0 1110.89 3.476l4.817 4.817a1 1 0 01-1.414 1.414l-4.816-4.816A6 6 0 012 8z" clip-rule="evenodd" /></svg>
          </div>
          <input type="text"
            [value]="searchTerm()"
            (input)="searchTerm.set($any($event.target).value)"
            class="block w-full pl-10 pr-3 py-2.5 border border-ink-900/15 leading-5 bg-cream-50 placeholder-stone2-400 focus:outline-none focus:ring-2 focus:ring-sage-500 focus:border-transparent sm:text-sm transition duration-150 shadow-sm"
            placeholder="Search documents by name, desc or ID...">
        </div>

        <button class="inline-flex items-center gap-2 px-5 py-2.5 bg-ink-900 text-cream-50 text-xs font-semibold uppercase tracking-wider shadow-sm hover:bg-sage-700 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-sage-500 transition-all duration-200 whitespace-nowrap"
          (click)="openAddDialog()">
          <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" viewBox="0 0 20 20" fill="currentColor">
            <path fill-rule="evenodd" d="M10 3a1 1 0 011 1v5h5a1 1 0 110 2h-5v5a1 1 0 11-2 0v-5H4a1 1 0 110-2h5V4a1 1 0 011-1z" clip-rule="evenodd" />
          </svg>
          Add Document
        </button>
      </div>
    </div>

    <div class="flex justify-center w-full">
      <div class="w-full max-w-3xl space-y-5">
        @for (document of filteredDocuments(); track document.id) {
          <app-documents [document]="document" (itemEdited)="onDocumentEdited($event)" (itemDeleted)="onDocumentDeleted($event)" class="block"></app-documents>
        } @empty {
          <div class="text-center py-20 text-cream-100/50">
            <p class="font-display text-2xl text-cream-50/80 mb-1">No documents yet</p>
            <p class="text-sm">Add your first file to begin tracking it.</p>
          </div>
        }
      </div>
    </div>
  </div>
</div>
