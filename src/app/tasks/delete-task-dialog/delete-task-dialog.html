<div class="flex flex-col h-auto min-h-[160px] justify-between p-4 bg-white rounded-xl shadow-xl w-full max-w-sm mx-auto">
  <div class="flex justify-between items-start mb-2">
    <h2 class="font-bold text-gray-900 text-xl tracking-tight">
      <span class="text-red-600 flex items-center gap-2">
        <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16" /></svg>
        Delete Task?
      </span>
    </h2>
    <button (click)="closeTaskDialog()" type="button" class="text-gray-400 hover:text-gray-600 transition-colors p-1 rounded-md hover:bg-gray-100 focus:outline-none">
      <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" viewBox="0 0 20 20" fill="currentColor"><path fill-rule="evenodd" d="M4.293 4.293a1 1 0 011.414 0L10 8.586l4.293-4.293a1 1 0 111.414 1.414L11.414 10l4.293 4.293a1 1 0 01-1.414 1.414L10 11.414l-4.293 4.293a1 1 0 01-1.414-1.414L8.586 10 4.293 5.707a1 1 0 010-1.414z" clip-rule="evenodd" /></svg>
    </button>
  </div>

  <div class="my-4 text-sm text-gray-600">
    <p>Are you sure you want to permanently delete <span class="font-bold text-gray-800">"{{ data.name }}"</span>?</p>
    <p class="text-xs text-red-500 mt-2 font-medium">This action cannot be undone.</p>
  </div>

  <div class="flex flex-row-reverse gap-3 mt-4 pt-4 border-t border-gray-100">
    <button (click)="confirmTaskDelete()" type="button" class="px-5 py-2.5 bg-red-600 hover:bg-red-700 text-white text-sm font-semibold rounded-lg shadow-sm transition-colors cursor-pointer focus:ring-2 focus:ring-red-500 focus:ring-offset-1 outline-none">
      Delete
    </button>
    <button (click)="closeTaskDialog()" type="button" class="px-5 py-2.5 bg-white hover:bg-gray-50 text-gray-700 text-sm font-semibold rounded-lg shadow-sm border border-gray-300 transition-colors cursor-pointer focus:ring-2 focus:ring-gray-200 outline-none">
      Cancel
    </button>
  </div>
</div>
