<div class="flex flex-col h-auto bg-cream-50 overflow-hidden shadow-2xl w-full max-w-lg mx-auto border border-ink-900/10">
  <div class="flex justify-between items-center bg-cream-100 border-b border-ink-900/10 p-5">
    <h2 class="font-display font-semibold text-ink-900 text-2xl tracking-wide flex items-center gap-2">
      <span class="h-7 w-1 bg-bronze-500 inline-block"></span>
      Add Task
    </h2>
    <button (click)="closeTaskDialog()" type="button"
      class="text-stone2-500 hover:text-ink-900 transition-colors p-1.5 hover:bg-cream-200 focus:outline-none">
      <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" viewBox="0 0 20 20" fill="currentColor"><path fill-rule="evenodd" d="M4.293 4.293a1 1 0 011.414 0L10 8.586l4.293-4.293a1 1 0 111.414 1.414L11.414 10l4.293 4.293a1 1 0 01-1.414 1.414L10 11.414l-4.293 4.293a1 1 0 01-1.414-1.414L8.586 10 4.293 5.707a1 1 0 010-1.414z" clip-rule="evenodd" /></svg>
    </button>
  </div>

  <form (ngSubmit)="addtask(form.value)" [formGroup]="form" class="p-6">
    <div class="space-y-5">
      <div>
        <label for="name" class="block text-xs font-semibold uppercase tracking-wider text-ink-800 mb-2">Task Name</label>
        <input id="name" type="text" formControlName="name" placeholder="New Task"
          class="w-full px-4 py-2 border border-ink-900/15 focus:outline-none focus:ring-2 focus:ring-sage-500 focus:border-transparent transition-shadow bg-cream-100 text-ink-900" />
        @if (nameIsInvalid) {
          <p class="text-red-500 text-xs mt-1 font-medium">Must be 6+ characters</p>
        }
      </div>

      <div>
        <label for="description" class="block text-xs font-semibold uppercase tracking-wider text-ink-800 mb-2">Description</label>
        <textarea id="description" formControlName="description" placeholder="Enter description" rows="3"
          class="w-full px-4 py-2 border border-ink-900/15 focus:outline-none focus:ring-2 focus:ring-sage-500 focus:border-transparent transition-shadow bg-cream-100 text-ink-900 resize-y"></textarea>
        @if (descriptionIsInvalid) {
          <p class="text-red-500 text-xs mt-1 font-medium">Must be 15+ characters</p>
        }
      </div>

      <div class="grid grid-cols-2 gap-4">
        <div>
          <label for="dueDate" class="block text-xs font-semibold uppercase tracking-wider text-ink-800 mb-2">Due Date</label>
          <input id="dueDate" type="date" formControlName="dueDate"
            class="w-full px-4 py-2 border border-ink-900/15 focus:outline-none focus:ring-2 focus:ring-sage-500 focus:border-transparent transition-shadow bg-cream-100 text-ink-900" />
          @if (dueDateIsInvalid) {
            <p class="text-red-500 text-xs mt-1 font-medium">Required</p>
          }
        </div>

        <div>
          <label for="departmentId" class="block text-xs font-semibold uppercase tracking-wider text-ink-800 mb-2">Department ID (Optional)</label>
          <input id="departmentId" type="number" formControlName="departmentId" placeholder="ID"
            class="w-full px-4 py-2 border border-ink-900/15 focus:outline-none focus:ring-2 focus:ring-sage-500 focus:border-transparent transition-shadow bg-cream-100 text-ink-900" />
        </div>
      </div>
    </div>

    <div class="flex justify-end gap-3 mt-8 pt-4 border-t border-ink-900/10">
      <button type="button" (click)="closeTaskDialog()"
        class="px-5 py-2.5 bg-cream-50 text-ink-800 font-semibold border border-ink-900/15 hover:bg-cream-200 transition-colors outline-none">
        Cancel
      </button>
      <button type="submit" [disabled]="form.invalid"
        class="px-6 py-2.5 bg-ink-900 text-cream-50 font-semibold uppercase tracking-wider text-sm hover:bg-sage-700 transition-colors outline-none shadow-md disabled:opacity-50 disabled:cursor-not-allowed">
        Add Task
      </button>
    </div>
  </form>
</div>
