<header class="flex items-center justify-between absolute top-0 left-0 right-0 z-50 px-6 sm:px-8 py-4 bg-transparent">

  <!-- Left: logo + title + user avatar (only when logged in) -->
  <div class="flex items-center gap-4">
    <img class="h-10 w-auto object-contain" [src]="imgSrc()" alt="logo">
    <a routerLink="/" class="font-display font-semibold text-2xl tracking-wide text-cream-50">{{title}}</a>

    @if (isLoggedIn() && userName()) {
      <div class="flex items-center gap-2 ml-2 pl-4 border-l border-cream-50/15">
        <div class="w-9 h-9 rounded-full flex items-center justify-center text-sm font-bold text-cream-50 select-none shadow-sm"
             [class]="isAdmin ? 'bg-bronze-500' : 'bg-sage-600'">
          {{ initials() }}
        </div>
        <div class="flex flex-col leading-tight">
          <span class="text-sm font-semibold text-cream-50">{{ userName() }}</span>
          <span class="text-[10px] font-bold uppercase tracking-wider"
                [class]="isAdmin ? 'text-bronze-400' : 'text-sage-300'">
            {{ userRole() }}
          </span>
        </div>
      </div>
    }
  </div>

  <!-- Right: nav links -->
  <div class="flex items-center space-x-5 text-sm font-medium text-cream-100/80">
    @if (isLoggedIn() && isAdmin) {
      <a routerLink="/admin"
         class="flex items-center gap-1.5 px-3 py-1.5 text-cream-50 bg-bronze-500 hover:bg-bronze-600 transition-colors font-semibold uppercase tracking-wider text-xs shadow-sm">
        <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" viewBox="0 0 20 20" fill="currentColor">
          <path fill-rule="evenodd" d="M2.166 4.999A11.954 11.954 0 0010 1.944 11.954 11.954 0 0017.834 5c.11.65.166 1.32.166 2.001 0 5.225-3.34 9.67-8 11.317C5.34 16.67 2 12.225 2 7c0-.682.057-1.35.166-2.001zm11.541 3.708a1 1 0 00-1.414-1.414L9 10.586 7.707 9.293a1 1 0 00-1.414 1.414l2 2a1 1 0 001.414 0l4-4z" clip-rule="evenodd"/>
        </svg>
        Admin Panel
      </a>
    }
    <a routerLink="/" class="hover:text-cream-50 transition-colors px-2 py-1 uppercase tracking-wide text-xs font-semibold">Home</a>
    <a routerLink="/tasks" class="hover:text-cream-50 transition-colors px-2 py-1 uppercase tracking-wide text-xs font-semibold">Tasks</a>
    <a routerLink="/documents" class="hover:text-cream-50 transition-colors px-2 py-1 uppercase tracking-wide text-xs font-semibold">Documents</a>
    <a routerLink="/departments" class="hover:text-cream-50 transition-colors px-2 py-1 uppercase tracking-wide text-xs font-semibold">Departments</a>
    <a routerLink="/analytics" class="hover:text-cream-50 transition-colors px-2 py-1 uppercase tracking-wide text-xs font-semibold">Analytics</a>
    <ng-content></ng-content>
  </div>

</header>
