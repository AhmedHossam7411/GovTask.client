<div class="flex justify-start mb-2"></div>

<div
  class="bg-white rounded-xl shadow-sm border border-gray-200 overflow-hidden transform transition-all duration-300 hover:shadow-md hover:-translate-y-1">

  <!-- Header -->
  <div class="flex items-center bg-gray-50 border-b border-gray-100 p-4">
    <div
      class="bg-lime-100 rounded-lg w-12 h-12 flex shrink-0 items-center justify-center text-lime-700 font-bold text-lg shadow-sm border border-lime-200">
      {{ department().name.charAt(0).toUpperCase() }}{{ department().name.charAt(1).toUpperCase() }}
    </div>

    <div class="ml-4 flex-1">
      <h2 class="text-lg font-bold text-gray-900">{{ department().name }}</h2>
      <p
        class="text-sm font-medium px-2 py-0.5 mt-1 inline-block bg-gray-100 text-gray-600 rounded-md border border-gray-200">
        ID: {{ department().id }}
      </p>
    </div>
  </div>

  <!-- Actions -->
  <div class="flex justify-end p-3 bg-white gap-2">

    <!-- View -->
    <button (click)="openViewDialog(department())"
      class="text-lime-600 hover:bg-lime-50 px-3 py-1.5 rounded-md text-sm font-medium transition-colors flex items-center gap-1">
      <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" />
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
          d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z" />
      </svg>
      <span>View</span>
    </button>

    <!-- Edit -->
    <button (click)="openEditDialog(department())"
      class="text-blue-600 hover:bg-blue-50 px-3 py-1.5 rounded-md text-sm font-medium transition-colors">
      Edit
    </button>

    <!-- Delete -->
    <button (click)="openDeleteDialog(department())"
      class="text-red-600 hover:bg-red-50 px-3 py-1.5 rounded-md text-sm font-medium transition-colors flex items-center gap-1">
      <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
          d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16" />
      </svg>
      <span>Delete</span>
    </button>

  </div>
</div>
