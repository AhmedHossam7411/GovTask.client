<div
  class="bg-cream-50 shadow-sm border border-ink-900/10 overflow-hidden transition-all duration-300 hover:shadow-lg hover:border-sage-300 group">
  <div class="flex">
    <div class="w-1 bg-bronze-500 group-hover:bg-sage-600 transition-colors"></div>

    <div class="flex-1">

      <div class="flex items-center p-4">
        <div
          class="bg-ink-900 w-12 h-12 flex shrink-0 items-center justify-center text-cream-50 font-bold text-lg shadow-sm">
          {{ department().name.charAt(0).toUpperCase() }}{{ department().name.charAt(1).toUpperCase() }}
        </div>

        <div class="ml-4 flex-1 min-w-0">
          <h2 class="text-lg font-display font-semibold text-ink-900 truncate">{{ department().name }}</h2>
          <div class="flex items-center gap-2 mt-1">
            <span class="text-[10px] font-semibold uppercase tracking-wider px-2 py-0.5 bg-cream-200 text-stone2-600 border border-ink-900/10">ID {{ department().id }}</span>
            <span class="text-[10px] font-semibold uppercase tracking-wider text-sage-700">Department</span>
          </div>
        </div>
      </div>

      <div class="flex justify-end px-3 py-2 border-t border-ink-900/5 gap-1">
        <button (click)="openViewDialog(department())"
          class="text-ink-700 hover:bg-cream-200 px-3 py-1.5 text-xs font-semibold uppercase tracking-wider transition-colors flex items-center gap-1">
          <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" />
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z" />
          </svg>
          View
        </button>
        <button (click)="openEditDialog(department())"
          class="text-bronze-700 hover:bg-bronze-300/20 px-3 py-1.5 text-xs font-semibold uppercase tracking-wider transition-colors">
          Edit
        </button>
        <button (click)="openDeleteDialog(department())"
          class="text-red-600 hover:bg-red-50 px-3 py-1.5 text-xs font-semibold uppercase tracking-wider transition-colors flex items-center gap-1">
          <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16" />
          </svg>
          Delete
        </button>
      </div>
    </div>
  </div>
</div>
